<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors V1</title>
    <link rel="stylesheet" href="/rock-paper-scissors/styles/rock-paper-scissors.css">
    
</head>
<body>

    <p class="title">Rock Paper and Scissors</p>
    
    <button onclick="
    pickComputerMove();
    playerGame('rock');
    " class="move-button"><img src="images/rock-emoji.png" class="move-icon"></button>


    <button onclick="
    pickComputerMove();
    playerGame('paper');
    " class="move-button"><img src="images/paper-emoji.png" class="move-icon"></button>


    <button onclick="
    pickComputerMove();
    playerGame('scissors');
    " class="move-button"><img src="images/scissors-emoji.png" class="move-icon"></button>

    <p class="js-result result"></p>
    <p class="js-moves"></p>
    <p class="js-score score"></p>


    <button onclick="
    score.wins = 0;
    score.losses = 0;
    score.ties = 0;
    localStorage.removeItem('score');
    updateScore();
    " class="reset">Reset button</button>
    

    <script src="script/rock-paper-scissors.js"></script>
</body>
</html>
