<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Shipping Calculator</title>

    <style>
        body {
            font-family: Areal;
        }
        .subscribe-btn {
            border: none;
            background-color: #000;
            color: #fff;
            padding: 10px 15px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .is-subscribed {
            background-color: rgb(240, 240, 240);
            color: #000;
        }

    </style>

</head>
<body>

    <p>YouTube Subscribe Button</p>
    <button onclick="
    subscribe()
    " class="js-subscribe-btn subscribe-btn">Subscribe</button>


    
    <script>

       function subscribe() {
        // const Subscribe = document.querySelector('button');
        // console.log(Subscribe);

        const subscribeBtn = document.querySelector('.js-subscribe-btn');

        if (subscribeBtn.innerHTML === 'Subscribe') {
            subscribeBtn.innerHTML = 'Subscribed';
            subscribeBtn.classList.add('is-subscribed');
        } else {
            subscribeBtn.innerHTML = 'Subscribe';
            subscribeBtn.classList.remove('is-subscribed')
        }

       }

     
       



    </script>
</body>
</html>
